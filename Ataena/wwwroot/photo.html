<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Añadir foto del trabajo</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="container">
    <h1>📸 Añadir foto del trabajo</h1>
    <p>
      Selecciona una foto desde tu galería o toma una nueva con la cámara de tu móvil.
    </p>

    <div class="buttons">
      <button id="btnUpload" class="btn btn-primary">📁 Seleccionar foto</button>
      <!-- Input file: visible pero muy pequeño para que funcione en móviles -->
      <input type="file"
             id="fileInput"
             accept="image/*"
             style="position: absolute; width: 1px; height: 1px; opacity: 0; overflow: hidden; z-index: -1;" />
    </div>

    <canvas id="canvas" style="display:none;"></canvas>

    <p id="status"></p>
  </div>

  <script src="/photo.js"></script>
</body>
</html>
